{% extends 'base.html' %}
{% load bootstrap %}

{% block title %} Deletar Hora Extra {% endblock %}


{% block main %}

    <h2>Removendo registro de hora extra</h2>
    <form method="post">
        {% csrf_token %}
        <h1>Tem certeze que gostaria de deletar o {{ object }}</h1>
        {{form}}
        <button type="submit" class="btn btn-danger">Confirmar</button>
    </form>

{% endblock %}
