{% extends 'base.html' %}

{% block title %} Delete Departamento {% endblock %}

{% block main %}
    <form method="post">
        {% csrf_token %}
        <h1> Você tem certeza que gostaria de deletar o departamento {{ departamento }}</h1>
        {{ form }}
        <button type="submit" class="btn btn-danger">Deletar</button>
    </form>
{% endblock %}
